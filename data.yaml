listsections:
  - title: My Guiding Principles
    items:
      - topic: Solve the root-cause, not the symptom
        text: |
          Sometimes it's easy to apply a quick fix without understanding why a bug appeared.
          Hotfixes are fine—but the underlying cause must always be uncovered,
          documented, and addressed.
      - topic: Automate only when it earns its keep
        text: |
          I've learned when automation amplifies
          clarity and when it simply adds machinery.
          Tools should serve people, not the other way around.
      - topic: Data and DRY
        text: |
          One of the most significant problems I've seen in software
          is bad software patterns that require what is known as
          "shotgun surgery" to maintain. It's better for data to drive logic.
